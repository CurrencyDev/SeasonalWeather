version = 1

# Initial values are generated from v0.17.0. A check fails if its finding count
# rises above the recorded maximum. Reductions should update the maximum
# downward; increases require a separately governed exception.

[checks.format]
maximum = 88
owner = "SeasonalWeather maintainers"
rationale = "Initial v0.17.0 Ruff formatter debt across 89 legacy files."
scope = "seasonalweather/, tests/, and tools/"
review_date = "2026-10-23"
removal_condition = "Reduce whenever legacy files are materially changed; reach zero."

[checks.lint]
maximum = 990
owner = "SeasonalWeather maintainers"
rationale = "Initial v0.17.0 Ruff debt."
scope = "seasonalweather/, tests/, and tools/"
review_date = "2026-10-23"
removal_condition = "Reduce as findings are corrected; do not permit net-new findings."

[checks.typecheck]
maximum = 81
owner = "SeasonalWeather maintainers"
rationale = "Initial v0.17.0 mypy debt."
scope = "seasonalweather/ and tools/quality/"
review_date = "2026-10-23"
removal_condition = "Reduce as package boundaries gain complete annotations."

[checks.dependency]
