[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
  "tests/architecture/fixtures/invalid",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B", "UP", "SIM"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B011"]

[tool.mypy]
python_version = "3.11"
files = ["seasonalweather", "tools/quality"]
check_untyped_defs = true
ignore_missing_imports = true
no_implicit_optional = true
show_error_codes = true
warn_redundant_casts = true
warn_return_any = true
warn_unreachable = true
warn_unused_configs = true
warn_unused_ignores = true

[tool.deptry]
known_first_party = ["seasonalweather"]
requirements_files = ["requirements.txt"]
requirements_files_dev = ["requirements-dev.txt"]
extend_exclude = [
  "tests/architecture/fixtures",
  "tools/quality",
]

[tool.bandit]
exclude_dirs = ["tests", ".venv", ".venv-ci"]
recursive = true
