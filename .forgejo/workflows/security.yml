name: Security

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: docker
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Gitleaks
        run: |
          set -eu
          apt-get update
          apt-get install -y curl ca-certificates tar
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan working tree for secrets
        run: |
          gitleaks dir --source . --redact --verbose --no-banner
